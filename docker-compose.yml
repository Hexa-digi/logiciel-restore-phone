services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD est obligatoire}
      POSTGRES_DB: nexus
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nexus:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD}@db:5432/nexus
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET est obligatoire}
      APP_OWNER_EMAIL: ${APP_OWNER_EMAIL:?APP_OWNER_EMAIL est obligatoire}
      APP_OWNER_PASSWORD: ${APP_OWNER_PASSWORD:?APP_OWNER_PASSWORD est obligatoire}
      COMPANY_NAME: ${COMPANY_NAME:-Mon entreprise}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SEED_ON_START: "true"
    restart: unless-stopped

volumes:
  nexus-db-data:
