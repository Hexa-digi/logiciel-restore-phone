services:
  nexus:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET est obligatoire}
      APP_OWNER_EMAIL: ${APP_OWNER_EMAIL:?APP_OWNER_EMAIL est obligatoire}
      APP_OWNER_PASSWORD: ${APP_OWNER_PASSWORD:?APP_OWNER_PASSWORD est obligatoire}
      COMPANY_NAME: ${COMPANY_NAME:-Mon entreprise}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SEED_ON_START: "true"
    volumes:
      - nexus-data:/app/data
    restart: unless-stopped

volumes:
  nexus-data:
